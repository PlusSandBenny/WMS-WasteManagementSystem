spring:
  application:
    name: "Waste Management Backend"
  datasource:
    url: "jdbc:mysql://localhost:3306/waste_management?createDatabaseIfNotExist=true"
    username: "root"
    password: "password"
    driver-class-name: "com.mysql.cj.jdbc.Driver"
  jpa:
    hibernate:
      ddl-auto: "update"
    show-sql: true
  servlet:
    multipart:
      max-file-size: "10MB"
      max-request-size: "10MB"

server:
  port: 8080

jwt:
  secret: "dev-secret-change-me-please-dev-secret-change-me-please-32b"

app:
  jwt:
    access-ttl-seconds: 900
    refresh-ttl-seconds: 2592000
  otp:
    return-code: true
  billing:
    default-monthly-fee-ngn: 2000
  uploads:
    dir: "uploads"

logging:
  level:
    com.wms.backend: "DEBUG"
