spring.application.name=Waste Management Backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/waste_management?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
jwt.secret=dev-secret-change-me-please-dev-secret-change-me-please-32b
jwt.expiration=86400000

# App
# 15 minutes inactivity timeout as short-lived access token (900s)
app.jwt.access-ttl-seconds=900
app.jwt.refresh-ttl-seconds=2592000
app.otp.return-code=true
app.billing.default-monthly-fee-ngn=2000
app.uploads.dir=uploads

# Upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.wms.backend=DEBUG
